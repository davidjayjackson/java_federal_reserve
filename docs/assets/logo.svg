<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FRED Calc add-in logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E86F0"/>
      <stop offset="1" stop-color="#155CBF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FFD65C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0A2C63" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#FFCE55" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="26" y="26" width="460" height="460" rx="96" fill="url(#bg)" filter="url(#soft)"/>
  <rect x="26" y="26" width="460" height="460" rx="96" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- gridlines -->
  <g stroke="#ffffff" stroke-opacity="0.10" stroke-width="2">
    <line x1="110" y1="174" x2="430" y2="174"/>
    <line x1="110" y1="219" x2="430" y2="219"/>
    <line x1="110" y1="264" x2="430" y2="264"/>
  </g>

  <!-- axes (L-shape) -->
  <g stroke="#DCE9FB" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round">
    <line x1="110" y1="118" x2="110" y2="300"/>
    <line x1="110" y1="300" x2="432" y2="300"/>
  </g>

  <!-- area fill under the trend line -->
  <path d="M135.6 260.4 L209.2 219 L282.8 235.2 L356.4 174 L430 138 L430 300 L135.6 300 Z"
        fill="url(#gold)" fill-opacity="0.16"/>

  <!-- gold upward trend line -->
  <path d="M135.6 260.4 L209.2 219 L282.8 235.2 L356.4 174 L430 138"
        fill="none" stroke="url(#gold)" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- data points -->
  <g fill="#ffffff">
    <circle cx="135.6" cy="260.4" r="6.5"/>
    <circle cx="209.2" cy="219" r="6.5"/>
    <circle cx="282.8" cy="235.2" r="6.5"/>
    <circle cx="356.4" cy="174" r="6.5"/>
    <circle cx="430" cy="138" r="7.5"/>
  </g>

  <!-- wordmark -->
  <text x="256" y="404" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="4" fill="#ffffff">FRED</text>
  <text x="256" y="440" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="600" letter-spacing="6" fill="#BFD6F7">CALC ADD-IN</text>
</svg>
